<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Channel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --bg2: #161618; --bg3: #1e1e21;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8; --text2: #888784; --text3: #555452;
    --accent: #c8a96e; --accent2: #e8c98e;
    --red: #c0392b; --red2: #e84d3d;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  /* HEADER */
  .header { padding: 1.5rem 2.5rem 1.25rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-icon { width: 38px; height: 38px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; fill: #0e0e0f; }
  .channel-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .channel-sub { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 1.25rem; }
  .indie-nav-link {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 0.72rem; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text2); text-decoration: none;
    border: 0.5px solid rgba(255,255,255,0.1);
    padding: 6px 14px; border-radius: 99px;
    transition: all 0.2s;
  }
  .indie-nav-link:hover { color: var(--red2); border-color: var(--red2); }
  .indie-nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red2); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  .live-dot { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
  .live-dot::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  /* INDIE PROMO BANNER */
  .indie-promo {
    margin: 1rem 2.5rem 0;
    background: linear-gradient(105deg, #1a1010 0%, #1e1414 60%, #1a1010 100%);
    border: 0.5px solid rgba(192,57,43,0.35);
    border-radius: 10px;
    padding: 1rem 1.4rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    flex-wrap: wrap;
    animation: slideIn 0.5s 0.3s ease both;
    position: relative; overflow: hidden;
  }
  .indie-promo::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--red2); border-radius: 10px 0 0 10px;
  }
  .indie-promo-left { display: flex; align-items: center; gap: 12px; }
  .indie-promo-icon {
    width: 36px; height: 36px; border-radius: 7px;
    background: rgba(192,57,43,0.15); border: 0.5px solid rgba(192,57,43,0.3);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .indie-promo-icon svg { width: 16px; height: 16px; fill: var(--red2); }
  .indie-promo-label { font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--red2); margin-bottom: 2px; font-weight: 500; }
  .indie-promo-text { font-size: 0.85rem; color: var(--text); font-weight: 400; }
  .indie-promo-text strong { color: var(--accent2); font-weight: 500; }
  .indie-promo-right { display: flex; align-items: center; gap: 10px; }
  .btn-indie {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--red); color: var(--text);
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    padding: 8px 18px; border-radius: 6px; text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .btn-indie:hover { background: var(--red2); transform: translateY(-1px); }
  .btn-indie svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; }
  .promo-close {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 1rem; line-height: 1;
    padding: 4px; transition: color 0.15s; flex-shrink: 0;
  }
  .promo-close:hover { color: var(--text2); }
  @keyframes slideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 82px); overflow: hidden; transition: height 0.3s ease; }
  .main-col { padding: 1.5rem 2rem 1.5rem 2.5rem; overflow-y: auto; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 1rem; }
  .cat-bar { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-btn { font-size: 0.73rem; font-family: 'DM Sans', sans-serif; padding: 5px 13px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em; }
  .cat-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e0f; font-weight: 500; }
  .player-wrap { background: #000; border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; width: 100%; border: 0.5px solid var(--border); position: relative; }
  .player-wrap iframe { width: 100%; height: 100%; display: block; border: none; }
  .player-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: var(--text3); font-size: 0.85rem; }
  .player-placeholder svg { width: 36px; height: 36px; stroke: var(--text3); fill: none; stroke-width: 1.2; }
  .np-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 600; line-height: 1.3; color: var(--text); }
  .np-meta { font-size: 0.78rem; color: var(--text2); margin-top: 5px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge { font-size: 0.68rem; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .b-movies { background: rgba(123,111,173,.18); color: #a99fd4; border: 0.5px solid rgba(123,111,173,.3); }
  .b-education { background: rgba(90,158,130,.18); color: #7ec4a8; border: 0.5px solid rgba(90,158,130,.3); }
  .b-news { background: rgba(106,157,196,.18); color: #90bee0; border: 0.5px solid rgba(106,157,196,.3); }
  .b-audio { background: rgba(196,122,110,.18); color: #e09b8d; border: 0.5px solid rgba(196,122,110,.3); }
  .b-texts { background: rgba(196,164,110,.18); color: #dcb87c; border: 0.5px solid rgba(196,164,110,.3); }
  .ext-link { font-size: 0.76rem; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; opacity: .85; }
  .ext-link:hover { opacity: 1; text-decoration: underline; }
  .ext-link svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; }
  .side-col { overflow-y: auto; padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 0; }
  .side-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .side-heading { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-weight: 500; }
  .result-count { font-size: 0.7rem; color: var(--text3); }
  .vcard { display: flex; gap: 10px; padding: 9px 6px; border-radius: 7px; cursor: pointer; transition: background 0.12s; border-bottom: 0.5px solid var(--border); }
  .vcard:last-child { border-bottom: none; }
  .vcard:hover { background: var(--bg3); }
  .vcard.active-card { background: var(--bg3); }
  .vcard.active-card .vcard-title { color: var(--accent); }
  .thumb { width: 80px; height: 46px; border-radius: 5px; background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 0.5px solid var(--border); position: relative; overflow: hidden; }
  .thumb svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 1.5; }
  .thumb-play { position: absolute; width: 20px; height: 20px; background: rgba(200,169,110,.9); border-radius: 50%; display: none; align-items: center; justify-content: center; }
  .thumb-play svg { width: 9px; height: 9px; stroke: #0e0e0f; fill: #0e0e0f; }
  .vcard.active-card .thumb-play { display: flex; }
  .vcard-info { flex: 1; min-width: 0; }
  .vcard-title { font-size: 0.8rem; font-weight: 500; color: var(--text); line-height: 1.35; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 3px; }
  .vcard-sub { font-size: 0.7rem; color: var(--text2); }
  .state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 2rem 1rem; color: var(--text3); font-size: 0.82rem; text-align: center; }
  .spinner { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-hover); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .search-row { display: flex; gap: 8px; align-items: center; }
  .search-input { flex: 1; padding: 7px 12px; border-radius: 7px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text); font-size: 0.82rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--border-hover); }
  .search-btn { padding: 7px 14px; border-radius: 7px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 0.8rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .search-btn:hover { border-color: var(--accent); color: var(--accent); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
    .side-col { border-top: 0.5px solid var(--border); max-height: 55vh; overflow-y: auto; }
    .main-col { border-right: none; }
    .header { padding: 1rem; }
    .main-col { padding: 1rem; }
    .indie-promo { margin: 0.75rem 1rem 0; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M4 8l8-5 8 5v8l-8 5-8-5V8z"/><path d="M12 3v18M4 8l8 5 8-5"/></svg>
    </div>
    <div>
      <div class="channel-name">Community Channel</div>
      <div class="channel-sub">Live queries · Internet Archive public domain</div>
    </div>
  </div>
  <div class="header-right">
    <a href="indie-videos.html" class="indie-nav-link">
      <span class="indie-nav-dot"></span>
      Indie Videos
    </a>
    <div class="live-dot">Live</div>
  </div>
</header>

<!-- INDIE PROMO BANNER -->
<div class="indie-promo" id="indiePromo">
  <div class="indie-promo-left">
    <div class="indie-promo-icon">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </div>
    <div>
      <div class="indie-promo-label">New · Indie Videos</div>
      <div class="indie-promo-text"><strong>The Switchblades — Always Getting High</strong> is now streaming. Check out our indie section.</div>
    </div>
  </div>
  <div class="indie-promo-right">
    <a href="indie-videos.html" class="btn-indie">
      Watch now
      <svg viewBox="0 0 12 12"><path d="M2 6h8M6 2l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <button class="promo-close" onclick="dismissPromo()" aria-label="Dismiss">✕</button>
  </div>
</div>

<div class="layout" id="layout">
  <div class="main-col">
    <div class="cat-bar" id="catBar"></div>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="Search archive.org…" />
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div class="player-wrap" id="playerWrap">
      <div class="player-placeholder" id="playerPlaceholder">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Select a video to play
      </div>
      <iframe id="player" style="display:none" allowfullscreen></iframe>
    </div>
    <div id="npArea" style="display:none">
      <div class="np-title" id="npTitle"></div>
      <div class="np-meta">
        <span class="badge" id="npBadge"></span>
        <span id="npYear"></span>
        <a class="ext-link" id="npLink" href="#" target="_blank">
          Archive page
          <svg viewBox="0 0 12 12"><path d="M2 2h8v8M10 2L2 10" stroke-linecap="round"/></svg>
        </a>
      </div>
    </div>
  </div>

  <div class="side-col">
    <div class="side-header">
      <div class="side-heading">Results</div>
      <div class="result-count" id="resultCount"></div>
    </div>
    <div id="playlist"></div>
  </div>
</div>

<script>
const BASE = 'https://archive.org/advancedsearch.php';
const CATS = [
  { key:'movies',    label:'Movies',           q:'mediatype:movies AND licenseurl:(*creativecommons* OR *publicdomain*) AND year:[1900 TO 1970]' },
  { key:'education', label:'Education',         q:'mediatype:movies AND subject:educational AND year:[1930 TO 1980]' },
  { key:'news',      label:'Newsreels',         q:'mediatype:movies AND (subject:newsreel OR subject:"news film") AND year:[1920 TO 1970]' },
  { key:'audio',     label:'Music',             q:'mediatype:audio AND licenseurl:(*publicdomain*) AND year:[1900 TO 1960]' },
  { key:'texts',     label:'Docs & Short films',q:'mediatype:movies AND subject:documentary AND year:[1920 TO 1970]' },
];
let activeCat='movies', activeId=null, results=[];

function dismissPromo() {
  const p = document.getElementById('indiePromo');
  p.style.transition = 'opacity 0.3s, transform 0.3s, max-height 0.4s, margin 0.4s, padding 0.4s';
  p.style.opacity = '0'; p.style.transform = 'translateY(-6px)';
  p.style.maxHeight = '0'; p.style.margin = '0'; p.style.padding = '0';
  p.style.borderWidth = '0';
  setTimeout(() => p.remove(), 400);
}

function renderCats() {
  document.getElementById('catBar').innerHTML = CATS.map(c =>
    `<button class="cat-btn${activeCat===c.key?' active':''}" onclick="pickCat('${c.key}')">${c.label}</button>`
  ).join('');
}
function pickCat(key) { activeCat=key; document.getElementById('searchInput').value=''; renderCats(); fetchCat(key); }

async function fetchCat(key) {
  const cat = CATS.find(c=>c.key===key); if(!cat) return;
  showLoading();
  try {
    const url = `${BASE}?q=${encodeURIComponent(cat.q)}&fl[]=identifier&fl[]=title&fl[]=year&fl[]=mediatype&fl[]=description&sort[]=downloads+desc&rows=30&output=json`;
    const res = await fetch(url);
    const data = await res.json();
    results = (data.response && data.response.docs) || [];
    renderPlaylist();
  } catch(e) { showError('Could not load results. Check your connection.'); }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim(); if(!q) return;
  activeCat=null; renderCats(); showLoading();
  try {
    const url = `${BASE}?q=${encodeURIComponent(q+' AND (mediatype:movies OR mediatype:audio)')}&fl[]=identifier&fl[]=title&fl[]=year&fl[]=mediatype&fl[]=description&sort[]=downloads+desc&rows=30&output=json`;
    const res = await fetch(url);
    const data = await res.json();
    results = (data.response && data.response.docs) || [];
    renderPlaylist();
  } catch(e) { showError('Search failed. Please try again.'); }
}
document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
function showLoading() { document.getElementById('playlist').innerHTML=`<div class="state-msg"><div class="spinner"></div><span>Loading from archive.org…</span></div>`; document.getElementById('resultCount').textContent=''; }
function showError(msg) { document.getElementById('playlist').innerHTML=`<div class="state-msg"><span>${msg}</span></div>`; }
function catClass(mt) { return 'b-'+(mt||'movies'); }
function catLabel(mt) { const m={movies:'Film',audio:'Audio',texts:'Text',education:'Education',news:'News'}; return m[mt]||mt||'Archive'; }
const ICON = {
  movies:`<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 4v16M17 4v16M2 9h5M17 9h5M2 15h5M17 15h5"/></svg>`,
  audio:`<svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
  default:`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
};
function renderPlaylist() {
  const count=results.length;
  document.getElementById('resultCount').textContent=count?`${count} results`:'';
  if(!count){document.getElementById('playlist').innerHTML=`<div class="state-msg"><span>No results found.</span></div>`;return;}
  document.getElementById('playlist').innerHTML=results.map(v=>{
    const isActive=v.identifier===activeId, icon=ICON[v.mediatype]||ICON.default, year=v.year||'';
    return `<div class="vcard${isActive?' active-card':''}" onclick="play(${JSON.stringify(v).replace(/"/g,'&quot;')})">
      <div class="thumb">${icon}<div class="thumb-play"><svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg></div></div>
      <div class="vcard-info">
        <div class="vcard-title">${escHtml(v.title||v.identifier)}</div>
        <div class="vcard-sub">${year?year+' · ':''}<span class="badge ${catClass(v.mediatype)}" style="font-size:.62rem;padding:1px 6px;">${catLabel(v.mediatype)}</span></div>
      </div></div>`;
  }).join('');
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function play(v) {
  if(typeof v==='string') v=JSON.parse(v);
  activeId=v.identifier;
  document.getElementById('playerPlaceholder').style.display='none';
  const iframe=document.getElementById('player');
  iframe.style.display='block';
  iframe.src=`https://archive.org/embed/${v.identifier}`;
  const mt=v.mediatype||'movies';
  document.getElementById('npArea').style.display='block';
  document.getElementById('npTitle').textContent=v.title||v.identifier;
  const badge=document.getElementById('npBadge');
  badge.className=`badge ${catClass(mt)}`;
  badge.textContent=catLabel(mt);
  document.getElementById('npYear').textContent=v.year||'';
  document.getElementById('npLink').href=`https://archive.org/details/${v.identifier}`;
  renderPlaylist();
}
renderCats();
fetchCat('movies');
</script>
</body>
</html>
